<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSC Quiz App</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Roboto Mono', monospace;
  background:#0F111A;
  color:#F0F2F5;
}

/* Screens */
.screen { display:none; padding:20px; }
.active { display:block; }

/* Grid */
.grid {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:15px;
}

.card {
  background:#1C1F2B;
  padding:20px;
  border-radius:15px;
  text-align:center;
  border:2px solid #2D313E;
}

.icon { font-size:28px; }

/* Question */
.question { font-size:18px; margin-bottom:15px; }

/* Options */
.option {
  background:#1C1F2B;
  border:2px solid #2D313E;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  color:#94A3B8;
}

.selected {
  border:2px solid #5CC9FF;
  background:#16212E;
  color:#5CC9FF;
}

.correct {
  border:2px solid #00C896;
  background:#122621;
  color:#00C896;
}

.wrong {
  border:2px solid #FF5F5F;
  background:#221818;
  color:#FF5F5F;
}

/* Buttons */
.btn {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#5CC9FF;
  color:#0F111A;
}

.submit {
  background:#00C896;
}

.nav {
  display:flex;
  justify-content:space-between;
}

.small {
  width:48%;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
<h2>Select Subject</h2>

<div class="grid">
<div class="card" onclick="start('psychology')"><div class="icon">🧑‍🏫</div>Psychology</div>
<div class="card" onclick="start('maths')"><div class="icon">🔢</div>Maths</div>
<div class="card" onclick="startMock()"><div class="icon">📝</div>Mock Test</div>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">

<p id="question" class="question"></p>
<div id="options"></div>

<button class="btn submit" onclick="submit()">Submit</button>

<p id="explanation"></p>

<div class="nav">
<button class="btn small" onclick="prev()">Previous</button>
<button class="btn small" onclick="next()">Next</button>
</div>

<p>Score: <span id="score">0</span></p>

</div>

<!-- RESULT -->
<div id="result" class="screen">
<h2>Result</h2>
<p id="final"></p>
<button class="btn" onclick="goHome()">Home</button>
</div>

<script>

/* QUESTIONS */
const DB = {

psychology: [
{
q:"അനുകരണത്തിലൂടെ പഠിക്കുന്നത് ഏത്?",
options:["ട്രയൽ ആൻഡ് എറർ","ഇൻസൈറ്റ്","ഓബ്സർവേഷൻ","കണ്ടീഷനിംഗ്"],
answer:2,
exp:"മറ്റുള്ളവരുടെ പ്രവർത്തനം നിരീക്ഷിച്ച് അതിനെ അനുകരിച്ച് പഠിക്കുന്നതാണ് ഓബ്സർവേഷണൽ ലേണിംഗ്. ബാൻഡൂറയുടെ സിദ്ധാന്തത്തിൽ ഇത് പ്രധാനമാണ്."
},
{
q:"കുട്ടികളുടെ ബൗദ്ധിക വികസന ഘട്ടങ്ങൾ അവതരിപ്പിച്ചത് ആര്?",
options:["പാവ്ലോവ്","സ്കിന്നർ","പിയാജെ","ഫ്രോയ്ഡ്"],
answer:2,
exp:"ജീൻ പിയാജെ കുട്ടികളുടെ ബൗദ്ധിക വികസനം നാല് ഘട്ടങ്ങളായി വിവരിച്ചു. സെൻസറി-മോട്ടോർ ഘട്ടത്തിൽ കുഞ്ഞ് ഇന്ദ്രിയങ്ങളും ചലനങ്ങളും ഉപയോഗിച്ച് പഠിക്കുന്നു. പിന്നീട് പ്രീ-ഓപ്പറേഷണൽ ഘട്ടത്തിൽ ഭാഷയും പ്രതീകാത്മക ചിന്തയും വളരുന്നു. കോൺക്രീറ്റ് ഓപ്പറേഷണൽ ഘട്ടത്തിൽ ലാജിക്കൽ ചിന്ത വികസിക്കുന്നു. ഫോർമൽ ഘട്ടത്തിൽ ആബ്സ്ട്രാക്റ്റ് ചിന്തയും പ്രശ്നപരിഹാര ശേഷിയും വർധിക്കുന്നു."
},
{
q:"ക്ലാസിക്കൽ കണ്ടീഷനിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചത് ആര്?",
options:["സ്കിന്നർ","പാവ്ലോവ്","തോർണ്ടൈക്ക്","ബാൻഡൂറ"],
answer:1,
exp:"ഇവാൻ പാവ്ലോവ് ക്ലാസിക്കൽ കണ്ടീഷനിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചു. ഒരു സ്വാഭാവിക പ്രതികരണത്തെ (ഉദാ: ഭക്ഷണം കണ്ടാൽ ലാലസ്രവം) ഒരു പുതിയ ഉത്തേജനവുമായി ബന്ധിപ്പിച്ച് പഠനം ഉണ്ടാക്കാം. നായയുടെ ലാലസ്രവ പരീക്ഷണം ഇതിന് ഉദാഹരണമാണ്."
},
{
q:"ഓപ്പറന്റ് കണ്ടീഷനിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചത് ആര്?",
options:["പാവ്ലോവ്","സ്കിന്നർ","പിയാജെ","ബ്രൂണർ"],
answer:1,
exp:"ബി.എഫ്. സ്കിന്നർ ആണ് ഓപ്പറന്റ് കണ്ടീഷനിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചത്. ഇതിൽ പെരുമാറ്റം ബഹുമതി (reward) അല്ലെങ്കിൽ ശിക്ഷ (punishment) വഴി നിയന്ത്രിക്കപ്പെടുന്നു. ശരിയായ പെരുമാറ്റത്തിന് ബഹുമതി നൽകുമ്പോൾ അത് ആവർത്തിക്കപ്പെടാൻ സാധ്യത കൂടുതലാണ്."
},
{
q:"ഇൻസൈറ്റ് ലേണിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചത് ആര്?",
options:["കോഹ്ലർ","സ്കിന്നർ","പാവ്ലോവ്","തോർണ്ടൈക്ക്"],
answer:0,
exp:"വോൾഫ്ഗാങ് കോഹ്ലർ ആണ് ഇൻസൈറ്റ് ലേണിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചത്. പ്രശ്നത്തിന് ഒരേസമയം അപ്രതീക്ഷിതമായി പരിഹാരം കണ്ടെത്തുന്ന പഠനമാണ് ഇൻസൈറ്റ്. ഇത് 'അഹാ അനുഭവം' എന്ന പേരിലും അറിയപ്പെടുന്നു."
},
{
q:"Learning by doing എന്ന ആശയം അവതരിപ്പിച്ചത് ആര്?",
options:["ജോൺ ഡ്യൂവി","പിയാജെ","സ്കിന്നർ","ഫ്രോയ്ഡ്"],
answer:0,
exp:"ജോൺ ഡ്യൂവി ആണ് 'Learning by Doing' എന്ന ആശയം മുന്നോട്ട് വെച്ചത്. കുട്ടികൾ പ്രവർത്തനത്തിലൂടെ പഠിക്കുമ്പോൾ അവർ കൂടുതൽ കാര്യക്ഷമമായി ആശയങ്ങൾ മനസ്സിലാക്കുന്നു. പ്രവർത്തനാധിഷ്ഠിത പഠനമാണ് ഇതിന്റെ അടിസ്ഥാനം."
},
{
q:"ബഹുമതി നൽകുന്നത് ഏത് പ്രക്രിയയിൽ ഉൾപ്പെടുന്നു?",
options:["പണിഷ്മെന്റ്","റീൻഫോഴ്‌സ്‌മെന്റ്","എക്സ്റ്റിങ്ക്ഷൻ","ജനറലൈസേഷൻ"],
answer:1,
exp:"റീൻഫോഴ്‌സ്‌മെന്റ് എന്നത് ഒരു പെരുമാറ്റം ശക്തിപ്പെടുത്തുന്നതിനുള്ള പ്രക്രിയയാണ്. പോസിറ്റീവ് റീൻഫോഴ്‌സ്‌മെന്റിൽ നല്ല പ്രവർത്തനത്തിന് ബഹുമതി നൽകുന്നു. ഇത് ആ പെരുമാറ്റം വീണ്ടും ആവർത്തിക്കാൻ പ്രേരിപ്പിക്കുന്നു."
},
{
q:"ശിക്ഷ നൽകുന്നത് എന്തിന് ഉപയോഗിക്കുന്നു?",
options:["പഠനം വർധിപ്പിക്കാൻ","പെരുമാറ്റം കുറയ്ക്കാൻ","പ്രേരണ നൽകാൻ","ഓർമ്മശക്തി വർധിപ്പിക്കാൻ"],
answer:1,
exp:"ശിക്ഷ (Punishment) ഒരു തെറ്റായ അല്ലെങ്കിൽ അനാവശ്യമായ പെരുമാറ്റം കുറയ്ക്കുന്നതിനാണ് ഉപയോഗിക്കുന്നത്. ഇത് നെഗറ്റീവ് ഫലങ്ങൾ കാണിക്കുന്നതിനാൽ ആ പെരുമാറ്റം വീണ്ടും ആവർത്തിക്കാതിരിക്കാൻ സഹായിക്കുന്നു."
},
{
q:"പ്രേരണ (Motivation) എന്താണ്?",
options:["പഠനം","ശിക്ഷ","പ്രവർത്തനത്തിന് പ്രേരിപ്പിക്കുന്ന ശക്തി","അഭ്യാസം"],
answer:2,
exp:"പ്രേരണ എന്നത് ഒരു വ്യക്തിയെ പ്രവർത്തനത്തിലേക്ക് നയിക്കുന്ന ആന്തരികമോ ബാഹ്യമായോ ഉള്ള ശക്തിയാണ്. ഇത് ലക്ഷ്യം കൈവരിക്കാൻ ഉത്സാഹവും ദിശയും നൽകുന്നു. ഉദാഹരണത്തിന്, പരീക്ഷയിൽ വിജയിക്കാൻ ഉള്ള ആഗ്രഹം."
},
{
q:"IQ എന്നത് എന്തിന്റെ ചുരുക്കപ്പേരാണ്?",
options:["Intelligent Quality","Intelligence Quotient","Internal Quality","Intelligent Question"],
answer:1,
exp:"IQ എന്നത് Intelligence Quotient എന്നതിന്റെ ചുരുക്കപ്പേരാണ്. ഇത് ഒരു വ്യക്തിയുടെ ബൗദ്ധിക ശേഷി അളക്കാനുള്ള ഒരു മാനദണ്ഡമാണ്. ബിനെ ആദ്യമായി ഇത് വികസിപ്പിച്ചു."
},
{
q:"ഭാഷാ വികസനത്തിൽ പ്രധാനപ്പെട്ട ഘടകം ഏത്?",
options:["പരിസ്ഥിതി","ഭക്ഷണം","ഉറക്കം","വ്യായാമം"],
answer:0,
exp:"ഭാഷാ വികസനത്തിൽ പരിസ്ഥിതി വളരെ പ്രധാനമാണ്. കുട്ടികൾ അവരുടെ ചുറ്റുപാടുകളിൽ നിന്ന് കേൾക്കുന്ന ഭാഷയെ അനുകരിച്ച് പഠിക്കുന്നു. മാതാപിതാക്കളുടെ സംഭാഷണവും സാമൂഹിക ഇടപെടലുകളും ഇതിൽ നിർണായകമാണ്."
},
{
q:"ട്രയൽ ആൻഡ് എറർ സിദ്ധാന്തം അവതരിപ്പിച്ചത് ആര്?",
options:["സ്കിന്നർ","തോർണ്ടൈക്ക്","പാവ്ലോവ്","പിയാജെ"],
answer:1,
exp:"തോർണ്ടൈക്കിന്റെ ട്രയൽ ആൻഡ് എറർ സിദ്ധാന്തപ്രകാരം പഠനം പല ശ്രമങ്ങളും പിശകുകളും വഴി ശരിയായ ഉത്തരത്തിലേക്ക് എത്തുന്നതാണ്."
},
{
q:"IQ എന്തിന്റെ ചുരുക്കപ്പേരാണ്?",
options:["Intelligent Quality","Intelligence Quotient","Internal Question","None"],
answer:1,
exp:"Intelligence Quotient (IQ) എന്നത് ബുദ്ധിശേഷി അളക്കാനുള്ള ഒരു മാനദണ്ഡമാണ്."
}
],

maths: [
{
q:"5 + 3 = ?",
options:["6","7","8","9"],
answer:2,
exp:"5 + 3 ചേർത്താൽ 8 ലഭിക്കും. ഇത് അടിസ്ഥാന ഗണിതമാണ്."
}
]

};

let Q=[],i=0,score=0,selected=null,answered=false;

/* START */
function start(sub){
Q = DB[sub];
init();
}

function startMock(){
Q = [...DB.psychology, ...DB.maths];
init();
}

function init(){
i=0;score=0;
show("quiz");
load();
}

/* LOAD */
function load(){
selected=null;
answered=false;
document.getElementById("explanation").innerText="";

let q=Q[i];
document.getElementById("question").innerText=q.q;

let html="";
q.options.forEach((opt,index)=>{
html+=`<div class="option" onclick="select(this,${index})">${opt}</div>`;
});
document.getElementById("options").innerHTML=html;
}

/* SELECT */
function select(el,index){
if(answered) return;
selected=index;

document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
}

/* SUBMIT */
function submit(){
if(selected===null || answered) return;

answered=true;

let q=Q[i];
let opts=document.querySelectorAll(".option");

if(selected===q.answer){
opts[selected].classList.add("correct");
score++;
}else{
opts[selected].classList.add("wrong");
opts[q.answer].classList.add("correct");
}

document.getElementById("score").innerText=score;
document.getElementById("explanation").innerText=q.exp;
}

/* NAV */
function next(){
if(i<Q.length-1){
i++; load();
}else{
finish();
}
}

function prev(){
if(i>0){
i--; load();
}
}

/* RESULT */
function finish(){
show("result");
document.getElementById("final").innerText="Score: "+score+" / "+Q.length;
}

/* UI */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function goHome(){
show("home");
}

</script>

</body>
</html>
