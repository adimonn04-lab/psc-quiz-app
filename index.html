<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PSC Quiz App</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family: 'Roboto Mono', monospace;
  background:#0F111A;
  color:#F0F2F5;
}

/* Screens */
.screen { display:none; padding:20px; }
.active { display:block; }

/* Buttons */
.main-btn {
  width:100%;
  padding:15px;
  margin:10px 0;
  background:#5CC9FF;
  color:#0F111A;
  border:none;
  font-size:16px;
  border-radius:10px;
}

/* Question Box */
.question {
  font-size:18px;
  margin-bottom:20px;
}

/* Options */
.option {
  background:#1C1F2B;
  border:2px solid #2D313E;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  color:#94A3B8;
}

/* States */
.selected {
  border:2px solid #5CC9FF;
  background:#16212E;
  color:#5CC9FF;
}

.correct {
  border:2px solid #00C896;
  background:#122621;
  color:#00C896;
}

.wrong {
  border:2px solid #FF5F5F;
  background:#221818;
  color:#FF5F5F;
}

/* Nav buttons */
.nav {
  display:flex;
  justify-content:space-between;
}

.small-btn {
  width:48%;
  padding:12px;
  background:#5CC9FF;
  color:#0F111A;
  border:none;
  border-radius:10px;
}

/* Submit */
.submit-btn {
  background:#00C896;
  color:#0F111A;
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- SUBJECT SCREEN -->
<div id="subjectScreen" class="screen active">
<h2>Select Subject</h2>

<button class="main-btn" onclick="startQuiz('maths')">Maths</button>
<button class="main-btn" onclick="startQuiz('science')">Science</button>
<button class="main-btn" onclick="startQuiz('social')">Social Science</button>
<button class="main-btn" onclick="startQuiz('gk')">GK</button>
<button class="main-btn" onclick="startQuiz('malayalam')">Malayalam</button>
<button class="main-btn" onclick="startQuiz('english')">English</button>

<h3>OR</h3>

<button class="main-btn" onclick="startMock()">Mock Test</button>

</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen" class="screen">

<p id="qText" class="question"></p>

<div id="options"></div>

<button class="submit-btn" onclick="submitAnswer()">Submit</button>

<p id="explanation"></p>

<div class="nav">
<button class="small-btn" onclick="prevQ()">Previous</button>
<button class="small-btn" onclick="nextQ()">Next</button>
</div>

<p>Score: <span id="score">0</span></p>

</div>

<!-- RESULT SCREEN -->
<div id="resultScreen" class="screen">
<h2>Result</h2>
<p id="finalScore"></p>
<button class="main-btn" onclick="restart()">Back to Home</button>
</div>

<script>

/* SAMPLE DATABASE (you will expand to 200+) */
const database = {
maths: [
{
q:"5 + 3 = ?",
options:["6","7","8","9"],
answer:2,
exp:"5 + 3 = 8"
}
],
science: [
{
q:"മനുഷ്യ ശരീരത്തിലെ ഏറ്റവും വലിയ അവയവം ഏത്?",
options:["ഹൃദയം","ത്വക്ക്","ശ്വാസകോശം","കരൾ"],
answer:1,
exp:"ത്വക്ക് ആണ് ഏറ്റവും വലിയ അവയവം."
}
],
social: [
{
q:"കേരളത്തിന്റെ തലസ്ഥാനം ഏത്?",
options:["കൊച്ചി","തിരുവനന്തപുരം","കോഴിക്കോട്","കണ്ണൂർ"],
answer:1,
exp:"തിരുവനന്തപുരം ആണ് കേരളത്തിന്റെ തലസ്ഥാനം."
}
],
gk: [
{
q:"ഇന്ത്യയുടെ ദേശീയ മൃഗം ഏത്?",
options:["സിംഹം","കടുവ","ആന","ചീറ്റ"],
answer:1,
exp:"കടുവയാണ് ദേശീയ മൃഗം."
}
],
malayalam: [
{
q:"'കവിത' എന്നത് എന്താണ്?",
options:["കഥ","ലേഖനം","പദ്യരൂപം","നോവൽ"],
answer:2,
exp:"പദ്യരൂപത്തിലുള്ള സാഹിത്യം ആണ് കവിത."
}
],
english: [
{
q:"Which is a noun?",
options:["Run","Beautiful","Book","Quickly"],
answer:2,
exp:"Book is a noun."
}
]
};

let currentSubject = "";
let questions = [];
let index = 0;
let score = 0;
let selected = null;

/* START QUIZ */
function startQuiz(subject){
currentSubject = subject;
questions = database[subject];
start();
}

/* MOCK */
function startMock(){
questions = [
...database.maths,
...database.science,
...database.social,
...database.gk,
...database.malayalam,
...database.english
];
start();
}

function start(){
index = 0;
score = 0;
showScreen("quizScreen");
loadQ();
}

/* LOAD QUESTION */
function loadQ(){
selected = null;
document.getElementById("explanation").innerText="";

let q = questions[index];
document.getElementById("qText").innerText = q.q;

let html = "";
q.options.forEach((opt,i)=>{
html += `<div class="option" onclick="selectOption(this,${i})">${opt}</div>`;
});
document.getElementById("options").innerHTML = html;
}

/* SELECT */
function selectOption(el,i){
selected = i;

document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
}

/* SUBMIT */
function submitAnswer(){
if(selected === null) return;

let q = questions[index];
let opts = document.querySelectorAll(".option");

if(selected === q.answer){
opts[selected].classList.add("correct");
score++;
} else {
opts[selected].classList.add("wrong");
opts[q.answer].classList.add("correct");
}

document.getElementById("score").innerText = score;
document.getElementById("explanation").innerText = q.exp;
}

/* NAV */
function nextQ(){
if(index < questions.length-1){
index++;
loadQ();
} else {
finish();
}
}

function prevQ(){
if(index > 0){
index--;
loadQ();
}
}

/* RESULT */
function finish(){
showScreen("resultScreen");
document.getElementById("finalScore").innerText =
"Score: " + score + " / " + questions.length;
}

/* SCREEN SWITCH */
function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function restart(){
showScreen("subjectScreen");
}

</script>

</body>
</html>
