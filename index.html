<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PSC Quiz App</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family: 'Roboto Mono', monospace;
  background:#0F111A;
  color:#F0F2F5;
}

/* Screens */
.screen { display:none; padding:20px; }
.active { display:block; }

/* GRID MENU */
.grid {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:15px;
}

.card {
  background:#1C1F2B;
  border-radius:15px;
  padding:20px;
  text-align:center;
  border:2px solid #2D313E;
}

.card:hover {
  border:2px solid #5CC9FF;
}

.icon {
  font-size:30px;
  margin-bottom:10px;
}

/* Question */
.question {
  font-size:18px;
  margin-bottom:20px;
}

/* Options */
.option {
  background:#1C1F2B;
  border:2px solid #2D313E;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  color:#94A3B8;
}

.selected {
  border:2px solid #5CC9FF;
  background:#16212E;
  color:#5CC9FF;
}

.correct {
  border:2px solid #00C896;
  background:#122621;
  color:#00C896;
}

.wrong {
  border:2px solid #FF5F5F;
  background:#221818;
  color:#FF5F5F;
}

/* Buttons */
.submit-btn {
  background:#00C896;
  color:#0F111A;
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
}

.nav {
  display:flex;
  justify-content:space-between;
}

.small-btn {
  width:48%;
  padding:12px;
  background:#5CC9FF;
  color:#0F111A;
  border:none;
  border-radius:10px;
}

.main-btn {
  width:100%;
  padding:15px;
  margin-top:20px;
  background:#5CC9FF;
  color:#0F111A;
  border:none;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- SUBJECT GRID -->
<div id="subjectScreen" class="screen active">

<h2>Select Subject</h2>

<div class="grid">

<div class="card" onclick="startQuiz('maths')">
<div class="icon">🔢</div>
<p>Maths</p>
</div>

<div class="card" onclick="startQuiz('science')">
<div class="icon">🧪</div>
<p>Science</p>
</div>

<div class="card" onclick="startQuiz('social')">
<div class="icon">🌍</div>
<p>Social</p>
</div>

<div class="card" onclick="startQuiz('gk')">
<div class="icon">🧠</div>
<p>GK</p>
</div>

<div class="card" onclick="startQuiz('malayalam')">
<div class="icon">📖</div>
<p>Malayalam</p>
</div>

<div class="card" onclick="startQuiz('english')">
<div class="icon">🔤</div>
<p>English</p>
</div>

<div class="card" onclick="startQuiz('psychology')">
<div class="icon">🧑‍🏫</div>
<p>Psychology</p>
</div>

<div class="card" onclick="startMock()">
<div class="icon">📝</div>
<p>Mock Test</p>
</div>

</div>

</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen" class="screen">

<p id="qText" class="question"></p>

<div id="options"></div>

<button class="submit-btn" onclick="submitAnswer()">Submit</button>

<p id="explanation"></p>

<div class="nav">
<button class="small-btn" onclick="prevQ()">Previous</button>
<button class="small-btn" onclick="nextQ()">Next</button>
</div>

<p>Score: <span id="score">0</span></p>

</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
<h2>Result</h2>
<p id="finalScore"></p>
<button class="main-btn" onclick="restart()">Back to Home</button>
</div>

<script>

/* DATABASE (Sample now — we expand to 200+) */
const database = {

maths: [
{q:"5 + 3 = ?",options:["6","7","8","9"],answer:2,exp:"5 + 3 = 8"}
],

malayalam: [

  {q:"അനുകരണത്തിലൂടെ പഠിക്കുന്നത് ഏത് പഠനരീതിയിലാണ് ഉൾപ്പെടുന്നത്?",
options:["ട്രയൽ ആൻഡ് എറർ","ഇൻസൈറ്റ് ലേണിംഗ്","ഓബ്സർവേഷണൽ ലേണിംഗ്","കണ്ടീഷനിംഗ്"],

exp:"ഓബ്സർവേഷണൽ ലേണിംഗ് (Observational Learning) എന്നത് മറ്റുള്ളവരുടെ പ്രവർത്തനം കാണുകയും അത് അനുകരിക്കുകയും ചെയ്യുന്നതിലൂടെ പഠിക്കുന്ന രീതിയാണ്. ആൽബർട്ട് ബാൻഡൂറയാണ് ഈ സിദ്ധാന്തം അവതരിപ്പിച്ചത്. ഉദാഹരണത്തിന്, ഒരു കുട്ടി അധ്യാപകനെ കാണിച്ച് എഴുതാൻ പഠിക്കുന്നത് ഈ രീതിയിലാണ്."

{

options:["സ്കിന്നർ","തോർണ്ടൈക്ക്","പാവ്ലോവ്","പിയാജെ"],
answer:1,
exp:"ട്രയൽ ആൻഡ് എറർ ലേണിംഗ് സിദ്ധാന്തം എഡ്വേർഡ് തോർണ്ടൈക്ക് ആണ് അവതരിപ്പിച്ചത്. ഈ സിദ്ധാന്തപ്രകാരം പഠനം ശ്രമങ്ങളും പിശകുകളും വഴി നടക്കുന്നു. ശരിയായ പ്രതികരണം കണ്ടെത്തുന്നതുവരെ വ്യക്തി പലതവണ ശ്രമിക്കുന്നു."
},

{
q:"കുട്ടികളുടെ ബൗദ്ധിക വികസന ഘട്ടങ്ങൾ അവതരിപ്പിച്ചത് ആര്?",

exp:"ജീൻ പിയാജെ കുട്ടികളുടെ ബൗദ്ധിക വികസനത്തെ കുറിച്ച് നാല് ഘട്ടങ്ങൾ നിർദ്ദേശിച്ചു. ഇവയാണ് സെൻസറി-മോട്ടോർ, പ്രീ-ഓപ്പറേഷണൽ, കോൺക്രീറ്റ് ഓപ്പറേഷണൽ, ഫോർമൽ ഓപ്പറേഷണൽ ഘട്ടങ്ങൾ. ഓരോ ഘട്ടത്തിലും കുട്ടികളുടെ ചിന്താശേഷി വ്യത്യസ്തമാണ്."
},

{
q:"ക്ലാസിക്കൽ കണ്ടീഷനിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചത് ആര്?",
options:["സ്കിന്നർ","പാവ്ലോവ്","തോർണ്ടൈക്ക്","ബാൻഡൂറ"],
answer:1,
exp:"ഇവാൻ പാവ്ലോവ് ക്ലാസിക്കൽ കണ്ടീഷനിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചു. ഒരു സ്വാഭാവിക പ്രതികരണത്തെ ഒരു പുതിയ ഉത്തേജനവുമായി ബന്ധിപ്പിച്ച് പഠനം ഉണ്ടാകുന്നതാണ് ഇത്. നായയുടെ ലാലസ്രവ പരീക്ഷണം പ്രശസ്തമാണ്."

{
q:"ഓപ്പറന്റ് കണ്ടീഷനിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചത് ആര്?",
options:["പാവ്ലോവ്","സ്കിന്നർ","പിയാജെ","ബ്രൂണർ"],
answer:1,
exp:"ബി.എഫ്. സ്കിന്നർ ആണ് ഓപ്പറന്റ് കണ്ടീഷനിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചത്. ഇതിൽ പെരുമാറ്റം ബഹുമതി (reward) അല്ലെങ്കിൽ ശിക്ഷ (punishment) വഴി നിയന്ത്രിക്കപ്പെടുന്നു. നല്ല പെരുമാറ്റത്തിന് ബഹുമതി നൽകുമ്പോൾ അത് വർധിക്കും."
},

{
q:"ഇൻസൈറ്റ് ലേണിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചത് ആര്?",
options:["കോഹ്ലർ","സ്കിന്നർ","പാവ്ലോവ്","തോർണ്ടൈക്ക്"],
answer:0,
exp:"വോൾഫ്ഗാങ് കോഹ്ലർ ആണ് ഇൻസൈറ്റ് ലേണിംഗ് സിദ്ധാന്തം അവതരിപ്പിച്ചത്. പ്രശ്നത്തിന് അപ്രതീക്ഷിതമായി പരിഹാരം കണ്ടെത്തുന്ന പഠനരീതിയാണ് ഇത്. ഇത് 'അഹാ അനുഭവം' എന്ന പേരിലും അറിയപ്പെടുന്നു."
},

{
q:"ബഹുമതി നൽകുന്നത് ഏത് പ്രക്രിയയിൽ ഉൾപ്പെടുന്നു?",
options:["പണിഷ്മെന്റ്","റീൻഫോഴ്‌സ്‌മെന്റ്","എക്സ്റ്റിങ്ക്ഷൻ","ജനറലൈസേഷൻ"],

},

{
q:"ഇന്റലിജൻസ് ടെസ്റ്റ് വികസിപ്പിച്ചത് ആര്?",

},

q:"IQ എന്നത് എന്തിന്റെ ചുരുക്കപ്പേരാണ്?",

},

{
q:"ശിക്ഷ നൽകുന്നത് എന്തിന്?",
options:["പഠനം വർധിപ്പിക്കാൻ","പെരുമാറ്റം കുറയ്ക്കാൻ","പ്രേരണ നൽകാൻ","അഭ്യാസം ചെയ്യാൻ"],

},

let questions=[],index=0,score=0,selected=null;

/* START */
function startQuiz(sub){
questions = database[sub];
start();
}

function startMock(){
questions = [].concat(
database.maths,
database.science,
database.social,
database.gk,
database.malayalam,
database.english,
database.psychology
);
start();
}

function start(){
index=0;score=0;
show("quizScreen");
loadQ();
}

/* LOAD */
function loadQ(){
selected=null;
document.getElementById("explanation").innerText="";

let q=questions[index];
document.getElementById("qText").innerText=q.q;

let html="";
q.options.forEach((o,i)=>{
html+=`<div class="option" onclick="selectOpt(this,${i})">${o}</div>`;
});
document.getElementById("options").innerHTML=html;
}

/* SELECT */
function selectOpt(el,i){
selected=i;
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
}

/* SUBMIT */
function submitAnswer(){
if(selected==null)return;

let q=questions[index];
let opts=document.querySelectorAll(".option");

if(selected==q.answer){
opts[selected].classList.add("correct");
score++;
}else{
opts[selected].classList.add("wrong");
opts[q.answer].classList.add("correct");
}

document.getElementById("score").innerText=score;
document.getElementById("explanation").innerText=q.exp;
}

/* NAV */
function nextQ(){
if(index<questions.length-1){index++;loadQ();}
else finish();
}

function prevQ(){
if(index>0){index--;loadQ();}
}

/* RESULT */
function finish(){
show("resultScreen");
document.getElementById("finalScore").innerText=
"Score: "+score+" / "+questions.length;
}

/* UI */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function restart(){
show("subjectScreen");
}

</script>
